function SatMap({onSelectZone}){
  const divRef=useRef(null), mapRef=useRef(null);
  useEffect(()=>{
    if(mapRef.current) return;
    delete L.Icon.Default.prototype._getIconUrl;
    L.Icon.Default.mergeOptions({
      iconRetinaUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png",
      iconUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
      shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
    });
    const map=L.map(divRef.current,{center:[22.9,82.55],zoom:9,zoomControl:false});
    mapRef.current=map;
    L.control.zoom({position:"bottomright"}).addTo(map);
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{attribution:"© Esri – USGS/NOAA",maxZoom:19}).addTo(map);
    L.polyline(HASDEO_RIVER,{color:"#38bdf8",weight:3,opacity:.85}).addTo(map).bindTooltip("Hasdeo River (Mahanadi tributary)",{sticky:true});
    ZONES.green.forEach(z=>{
      const p=L.polygon(z.poly,{color:"#22c55e",weight:2,fillColor:"#22c55e",fillOpacity:.17,dashArray:"10 5"}).addTo(map);
      p.bindPopup(popupGreen(z),{maxWidth:340}); p.on('click',()=>onSelectZone({...z,zt:"green"}));
    });
    ZONES.orange.forEach(z=>{
      const p=L.polygon(z.poly,{color:"#f97316",weight:2.5,fillColor:"#f97316",fillOpacity:.24,dashArray:"10 6"}).addTo(map);
      p.bindPopup(popupOrange(z),{maxWidth:340}); p.on('click',()=>onSelectZone({...z,zt:"orange"}));
    });
    ZONES.red.forEach(z=>{
      const p=L.polygon(z.poly,{color:"#ef4444",weight:2.5,fillColor:"#ef4444",fillOpacity:.28}).addTo(map);
      p.bindPopup(popupRed(z),{maxWidth:360}); p.on('click',()=>onSelectZone({...z,zt:"red"}));
    });
    INCIDENTS.forEach(inc=>{
      L.marker(inc.pos,{icon:makeIcon(inc.type,inc.icon)}).addTo(map)
        .bindPopup(`<div style="font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.7"><div style="font-weight:700;color:${incColor(inc.type)};margin-bottom:5px">${inc.icon} ${inc.label}</div><div style="color:#9db89d;font-size:10px">${inc.detail}</div></div>`,{maxWidth:320})
        .bindTooltip(`<b>${inc.label}</b>`,{sticky:true});
    });
    return()=>{map.remove();mapRef.current=null;};
  },[]);
  return(
    <div style={{position:"relative"}}>
      <div ref={divRef} style={{height:570,width:"100%",borderRadius:8}}/>
      <div style={{position:"absolute",top:10,left:10,zIndex:1000,background:"#060d06dd",backdropFilter:"blur(8px)",border:"1px solid #1e3a1e",borderRadius:6,padding:"6px 10px",fontSize:10,color:"#4ade80",pointerEvents:"none"}}>
        🛰 ESRI World Imagery · Sentinel-2 · Hasdeo Arand, Chhattisgarh
      </div>
      <div style={{position:"absolute",top:10,right:10,zIndex:1000,background:"#060d06ee",backdropFilter:"blur(8px)",border:"1px solid #1e3a1e",borderRadius:7,padding:"10px 12px",fontSize:9,pointerEvents:"none",lineHeight:2}}>
        <div style={{color:"#6b9c6b",marginBottom:4,fontSize:9,letterSpacing:".07em",textTransform:"uppercase"}}>Map Legend</div>
        {[["#ef4444","Active Mining (Critical)"],["#f97316","Disputed / Illegal"],["#22c55e","Protected Forest / Reserve"],["#38bdf8","Hasdeo River"],["#f87171","💥  Active Pit"],["#a78bfa","✊  Protest Village"],["#f472b6","☣  Pollution Point"],["#60a5fa","🐘  Wildlife Corridor"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:9,height:9,borderRadius:2,background:c,flexShrink:0}}/><span style={{color:"#9db89d"}}>{l}</span></div>
        ))}
      </div>
      <div style={{position:"absolute",bottom:46,left:10,zIndex:1000,background:"#060d06dd",border:"1px solid #1e3a1e",borderRadius:5,padding:"4px 9px",fontSize:9,color:"#6b9c6b",pointerEvents:"none"}}>Click any zone or marker for details · All zones are real geographical boundaries</div>
    </div>
  );
}

function SBar({v,max,c}){return<div style={{height:5,background:"#1e2a1e",borderRadius:3,overflow:"hidden",marginTop:5}}><div className="score-fill" style={{width:`${Math.min(v/max*100,100).toFixed(1)}%`,background:c}}/></div>}

function Metric({label,value,unit,level,sub,bar,barMax}){
  const clr={HIGH:{fg:"#ef4444",bg:"#2d050544",br:"#7f1d1d44"},MOD:{fg:"#f59e0b",bg:"#2d1f0044",br:"#78350f44"},LOW:{fg:"#22c55e",bg:"#05140544",br:"#16653444"},BLUE:{fg:"#60a5fa",bg:"#1e3a5f33",br:"#1e3a5f44"},PURPLE:{fg:"#c084fc",bg:"#2e1a4e33",br:"#6b21a844"}}[level]||{fg:"#60a5fa",bg:"#1e3a5f33",br:"#1e3a5f44"};
  return(
    <div style={{background:clr.bg,border:`1px solid ${clr.br}`,borderLeft:`3px solid ${clr.fg}`,borderRadius:6,padding:"9px 13px",marginBottom:7}}>
      <div style={{fontSize:9,color:"#6b7c6b",letterSpacing:".09em",textTransform:"uppercase",marginBottom:2}}>{label}</div>
      <div style={{display:"flex",alignItems:"baseline",gap:5}}>
        <span style={{fontSize:21,fontWeight:700,color:clr.fg,fontFamily:"'IBM Plex Mono',monospace"}}>{value}</span>
        {unit&&<span style={{fontSize:11,color:"#6b7c6b"}}>{unit}</span>}
      </div>
      {sub&&<div style={{fontSize:10,color:"#6b7c6b",marginTop:1,lineHeight:1.4}}>{sub}</div>}
      {bar&&<SBar v={parseFloat(value)} max={barMax||100} c={clr.fg}/>}
    </div>
  );
}

function Loading(){
  const msgs=["Loading Sentinel-2 L2A bands…","Computing NDVI temporal delta 2013–2025…","Cross-referencing FSI Forest Cover 2023…","Querying HACF block boundary data…","Checking CPCB pollution indices…","Cross-matching NGT/SC case registry…","Running compliance status matrix…"];

  useEffect(()=>{const t=setInterval(()=>setI(x=>(x+1)%msgs.length),280);return()=>clearInterval(t)},[]);
  return(
    <div style={{textAlign:"center",padding:"30px 20px"}}>
      <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:14}}>
        {[0,1,2,3,4].map(j=><div key={j} style={{width:8,height:8,borderRadius:"50%",background:"#4ade80",animation:`pulse 1.2s ease-in-out ${j*.15}s infinite`}}/>)}

    </div>
  );
}

        <div style={{maxWidth:1500,margin:"0 auto",display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#3d5c3d",flexWrap:"wrap"}}>
          <span>MoEFCC/EIA/CG/COAL/HAC/2024</span><span style={{color:"#1a2e1a"}}>›</span>
          <span style={{color:"#6b9c6b"}}>Hasdeo Arand Coalfield (HACF)</span><span style={{color:"#1a2e1a"}}>›</span>
          <span>Satellite Pre-screening · 6 Active + 4 Disputed Blocks</span>
          <div style={{marginLeft:"auto",display:"flex",gap:7,flexWrap:"wrap"}}>
            <span style={{background:"#1a0505",border:"1px solid #7f1d1d",color:"#f87171",borderRadius:3,padding:"1px 7px",fontSize:9}}>CATEGORY A – EIA MANDATORY</span>
            <span style={{background:"#1a0a00",border:"1px solid #c2410c",color:"#fb923c",borderRadius:3,padding:"1px 7px",fontSize:9}}>⚑ SC MATTER PENDING</span>
            <span style={{background:"#1a1500",border:"1px solid #854d0e",color:"#fbbf24",borderRadius:3,padding:"1px 7px",fontSize:9}}>CPCB CRITICALLY POLLUTED</span>
            <span style={{background:"#0a1a0a",border:"1px solid #166534",color:"#4ade80",borderRadius:3,padding:"1px 7px",fontSize:9}}>● Active Monitoring</span>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1500,margin:"0 auto",padding:"18px 22px",display:"grid",gridTemplateColumns:"1fr 410px",gap:20}}>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"#1a2e1a",borderRadius:7,overflow:"hidden"}}>
            {[["Coalfield","1,879.6 km²"],["Forest","1,502 km²"],["Active Mines","6 pits"],["Coal Blocks","23 total"],["Trees Felled","2,42,670+"],["Displaced","~5,000+"],["PM₂.₅","312 μg/m³"]].map(([k,v])=>(
              <div key={k} style={{background:"#0a140a",padding:"7px 10px"}}>
                <div style={{fontSize:8,color:"#3d5c3d",textTransform:"uppercase",letterSpacing:".08em"}}>{k}</div>
                <div style={{fontSize:10,color:"#c8d8c8",marginTop:2,fontFamily:"'IBM Plex Sans',sans-serif",fontWeight:600}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{borderRadius:8,overflow:"hidden",border:"2px solid #1a2e1a"}}>
            <SatMap onSelectZone={setSel}/>
          </div>
          <div style={{background:"#0a140a",border:"1px solid #1a2e1a",borderRadius:7,padding:"10px 14px"}}>
            <div style={{fontSize:9,color:"#3d5c3d",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>All Mapped Mine Blocks (click to select)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
              {[...ZONES.red.map(z=>({...z,c:"#ef4444",zt:"red"})),...ZONES.orange.map(z=>({...z,c:"#f97316",zt:"orange"}))].map(z=>(
                <div key={z.id} className="blk-card" onClick={()=>setSel({...z})} style={{display:"flex",alignItems:"flex-start",gap:6,background:`${z.c}0d`,border:`1px solid ${z.c}2a`,borderRadius:4,padding:"6px 8px",cursor:"pointer",transition:"all .15s"}}>
                  <div style={{width:7,height:7,borderRadius:1,background:z.c,marginTop:3,flexShrink:0}}/>
                  <div><div style={{fontSize:9,color:z.c,fontWeight:700}}>{z.label}</div><div style={{fontSize:8,color:"#3d5c3d",marginTop:1}}>{z.severity||z.id}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <Panel sel={sel}/>
      </div>

      <div style={{borderTop:"1px solid #0d1a0d",padding:"11px 22px",marginTop:2}}>
        <div style={{maxWidth:1500,margin:"0 auto",display:"flex",justifyContent:"space-between",fontSize:8,color:"#1a2e1a"}}>
          <span>PARIVESH 3.0 · Integrated Environmental Clearance Platform · MoEFCC, Government of India</span>
          <span>Prototype v3.0-alpha · Hackathon · Zone shapes approximate real boundaries; all metrics from public records (FSI, CPCB, CGPCB, NGT, MoEFCC, GSI)</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
